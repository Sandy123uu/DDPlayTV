<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DDPlayTV 日志下载</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f14;
        --panel: #121826;
        --text: #e6edf3;
        --muted: #8b949e;
        --border: #2d3748;
        --btn: #1f6feb;
        --btn-disabled: #30363d;
        --ok: #2ea043;
        --error: #ff6b6b;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: radial-gradient(circle at top, #162033 0%, var(--bg) 65%);
        color: var(--text);
      }
      main {
        max-width: 860px;
        margin: 24px auto;
        padding: 0 16px 24px;
      }
      .panel {
        background: color-mix(in oklab, var(--panel) 94%, #000 6%);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.24);
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      .subtitle {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.6;
      }
      .group {
        margin-top: 18px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 13px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0b1220;
        color: var(--text);
        padding: 10px 12px;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      button {
        border: 0;
        border-radius: 10px;
        background: var(--btn);
        color: #fff;
        font-weight: 600;
        padding: 10px 16px;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        background: var(--btn-disabled);
      }
      .hint {
        margin-top: 12px;
        white-space: pre-wrap;
        font-size: 13px;
      }
      .hint.ok {
        color: var(--ok);
      }
      .hint.error {
        color: var(--error);
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      .note {
        margin-top: 16px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }
      code {
        padding: 1px 6px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>DDPlayTV HTTP 日志下载</h1>
        <p class="subtitle">
          服务只提供日志 ZIP 下载，下载后请在本地使用文本工具（如 <code>rg</code>）检索排查。
        </p>

        <div class="group">
          <label for="tokenInput">Token（可空；若 URL 带 <span class="mono">?token=</span> 会自动填充）</label>
          <input id="tokenInput" class="mono" placeholder="请输入访问 Token" />
        </div>

        <div class="actions">
          <button id="btnDownload">下载日志 ZIP</button>
        </div>

        <div id="hint" class="hint"></div>

        <p class="note">
          下载接口：<span class="mono">/api/v1/logs/download</span><br />
          如果浏览器环境受限，也可使用 curl：
          <span class="mono">curl -L -H "Authorization: Bearer &lt;token&gt;" -o ddplaytv-logs.zip http://&lt;ip&gt;:17010/api/v1/logs/download</span>
        </p>
      </section>
    </main>

    <script>
      const tokenInput = document.getElementById("tokenInput");
      const hint = document.getElementById("hint");
      const btnDownload = document.getElementById("btnDownload");

      tokenInput.value = new URLSearchParams(location.search).get("token") || "";

      function setHint(message, state) {
        hint.textContent = message || "";
        hint.className = "hint" + (state ? " " + state : "");
      }

      function buildHeaders() {
        const token = tokenInput.value.trim();
        const headers = {};
        if (token) {
          headers["Authorization"] = "Bearer " + token;
        }
        return headers;
      }

      function resolveFileName(response) {
        const disposition = response.headers.get("Content-Disposition") || "";
        const match = disposition.match(/filename\s*=\s*"?([^";]+)"?/i);
        if (match && match[1]) {
          return match[1];
        }
        const now = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        const fallback =
          now.getFullYear() +
          pad(now.getMonth() + 1) +
          pad(now.getDate()) +
          "-" +
          pad(now.getHours()) +
          pad(now.getMinutes()) +
          pad(now.getSeconds());
        return "ddplaytv-logs-" + fallback + ".zip";
      }

      async function downloadLogs() {
        btnDownload.disabled = true;
        setHint("下载中...", "");
        try {
          const response = await fetch("/api/v1/logs/download", {
            method: "GET",
            headers: buildHeaders(),
          });
          if (!response.ok) {
            const body = await response.text();
            throw new Error(response.status + " " + body.slice(0, 200));
          }

          const blob = await response.blob();
          const fileName = resolveFileName(response);
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);

          const sizeMb = (blob.size / 1024 / 1024).toFixed(2);
          setHint("下载完成：" + fileName + "\n大小：" + sizeMb + " MB", "ok");
        } catch (error) {
          const message = error && error.message ? error.message : String(error);
          setHint("下载失败：" + message, "error");
        } finally {
          btnDownload.disabled = false;
        }
      }

      btnDownload.addEventListener("click", downloadLogs);
    </script>
  </body>
</html>
