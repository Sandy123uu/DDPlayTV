name: package debug

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: '填写要编译的commit（留空则用当前最新）'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_hash || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: 仅编译 arm64-v8a
        run: ./gradlew assembleDebug -Pandroid.buildTypes.debug.ndk.abiFilters=arm64-v8a

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: DDPlayTV-arm64-apk
          path: app/build/outputs/apk/debug/*.apk
