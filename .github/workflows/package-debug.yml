name: package debug

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: '输入 Commit Hash (留空=最新版)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 安全检出代码
      uses: actions/checkout@v4  # ✅ v4 是当前推荐版（v3 无淘汰风险）
      
    - name: 🔍 切换至指定 Commit
      if: ${{ inputs.commit_hash != '' }}
      run: git reset --hard ${{ inputs.commit_hash }}

    - name: ⚙️ JDK 17
      uses: actions/setup-java@v3  # ✅ 此 Action 的 v3 仍安全（与 upload-artifact 无关）
      with: { java-version: '17', distribution: 'temurin' }

    - name: 🛠️ 彻底绕过 GPG 签名
      run: |
        # 直接删除加密文件（Fork 仓库无解密密钥）
        rm -f gradle/assemble/.jks.gpg
        # 强制使用 Gradle 默认 debug 签名
        echo "android.injected.signing.store.file=debug.keystore" >> local.properties

    - name: 🏗️ 构建 arm64-v8a
      run: ./gradlew assembleRelease -Pandroid.injected.build.abi=arm64-v8a

    - name: 📤 上传 APK（v4+ 安全版）
      uses: actions/upload-artifact@v4  # ✅ **必须用 v4+**，v3 已淘汰
      with:
        name: DDPlayTV-arm64
        path: app/build/outputs/apk/release/*.apk
        retention-days: 7  # 避免默认 1 天过期
