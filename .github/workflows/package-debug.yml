name: package debug

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: '请输入要构建的 Commit Hash (留空则构建最新版)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    # 🔑 关键修复：仅此处添加 Node.js 24 兼容性，其他需求 100% 保留
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 2026-06-02 前必须存在

    steps:
    - name: 📥 获取代码
      uses: actions/checkout@v5  # ✅ 仅此处升级到 v5（v4 已淘汰）

    - name: 🔍 检出指定 Commit
      if: ${{ inputs.commit_hash != '' }}
      run: |
        git reset --hard ${{ inputs.commit_hash }}
        echo "已切换到 Commit: ${{ inputs.commit_hash }}"

    - name: ⚙️ 设置 JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 📦 Gradle 缓存
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

    - name: 🛠️ 强制使用 Debug 签名（绕过密钥缺失）
      run: |
        # 100% 保留您原始需求：忽略 Release 签名，使用 Debug Keystore
        echo "android.injected.signing.store.file=${HOME}/.android/debug.keystore" >> local.properties
        echo "android.injected.signing.store.password=android" >> local.properties
        echo "android.injected.signing.key.alias=androiddebugkey" >> local.properties
        echo "android.injected.signing.key.password=android" >> local.properties

    - name: 🏗️ 仅构建 arm64-v8a APK
      run: |
        # 100% 保留您原始需求：仅生成 arm64 架构
        ./gradlew assembleRelease \
          -Pandroid.injected.build.abi=arm64-v8a \
          --no-daemon

    - name: 📤 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: DDPlayTV-arm64-debug-apk
        path: app/build/outputs/apk/release/*.apk
