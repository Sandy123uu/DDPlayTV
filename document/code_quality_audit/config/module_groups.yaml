version: 1
source:
  settingsGradle: "settings.gradle.kts"
  generatedAt: "2026-02-03"

# 模块分组用于：分工、排查顺序、以及汇总口径统一。
# 说明：
# - modules 必须与 settings.gradle.kts 的 include(...) 保持一致（纳入构建范围）
# - order 越小越先排查（推荐顺序：底层/被多处复用的先做）
groups:
  - id: base
    name: "Base（data/contract）"
    order: 10
    modules:
      - ":data_component"
      - ":core_contract_component"

  - id: runtime
    name: "Runtime（system/log）"
    order: 20
    modules:
      - ":core_system_component"
      - ":core_log_component"

  - id: infra
    name: "Infrastructure（network/db/storage/bilibili）"
    order: 30
    modules:
      - ":core_network_component"
      - ":core_database_component"
      - ":core_storage_component"
      - ":bilibili_component"

  - id: ui
    name: "UI Foundation（core_ui）"
    order: 40
    modules:
      - ":core_ui_component"

  - id: feature
    name: "Feature（业务组件）"
    order: 50
    modules:
      - ":anime_component"
      - ":local_component"
      - ":user_component"
      - ":storage_component"
      - ":player_component"

  - id: app
    name: "App Shell"
    order: 60
    modules:
      - ":app"

  - id: repository
    name: "repository wrappers（第三方 AAR 封装）"
    order: 70
    modules:
      - ":repository:danmaku"
      - ":repository:immersion_bar"
      - ":repository:panel_switch"
      - ":repository:seven_zip"
      - ":repository:thunder"
      - ":repository:video_cache"

