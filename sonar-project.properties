sonar.projectKey=okami-horo_DDPlayTV
sonar.organization=okami-horo

# CI 默认不分析 C/C++/ObjC（NDK/三方源码会触发 CFamily 传感器要求 build-wrapper）
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

# 基于本轮治理范围限定扫描目录（仅运行时代码 + 基础模块 + buildSrc）
# 说明：scripts/sonarcloud 为质量治理辅助脚本，不属于产品运行代码，不纳入项目质量门口径。
sonar.sources=app,anime_component,bilibili_component,core_contract_component,core_database_component,core_log_component,core_network_component,core_storage_component,core_system_component,core_ui_component,data_component,local_component,player_component,storage_component,user_component,buildSrc/src/main/java
# sonar.tests 由 CI 脚本 scripts/sonarcloud/collect_sonar_scope.sh 动态注入，避免模块变更后路径失效
sonar.test.inclusions=**/src/test/**,**/src/androidTest/**

# JaCoCo XML 由 `./gradlew jacocoTestReport` 生成
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
sonar.coverage.exclusions=**/R.java,**/R.kt,**/R.class,**/R$*.class,**/BuildConfig.*,**/Manifest*.*,**/*Test*.*,**/src/androidTest/**,**/src/test/**,**/src/main/assets/**,**/build/**,repository/**,scripts/sonarcloud/**

# 重复率治理：模板/静态资源与三方封装目录不纳入 CPD
sonar.cpd.exclusions=**/src/main/assets/**,repository/**,**/build/**

# 通用排除项
sonar.exclusions=**/build/**,.gradle/**,.specify/**,.codex/**,.sonarcloud-report/**,repository/**

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=DDPlayTV
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8
