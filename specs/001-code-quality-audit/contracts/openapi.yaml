openapi: 3.0.3
info:
  title: DDPlayTV Code Quality Audit (Planning Contract)
  version: 0.1.0
  description: |
    本 OpenAPI 文件用于“代码质量排查与复用治理（分模块）”的规划阶段，定义后续若要落地成
    文档工具/内部服务/自动化汇总脚本时可复用的数据契约。

    注意：本仓库当前未实现该 API；此文件仅作为规划产出物与跨角色沟通载体。
servers:
  - url: http://localhost

tags:
  - name: Modules
  - name: Reports
  - name: Findings
  - name: Tasks
  - name: Summaries

paths:
  /v1/module-groups:
    get:
      tags: [Modules]
      summary: 获取模块分组列表
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleGroup"
    put:
      tags: [Modules]
      summary: 覆盖更新模块分组（规划配置）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/ModuleGroup"
      responses:
        "204":
          description: No Content

  /v1/modules:
    get:
      tags: [Modules]
      summary: 获取模块列表（与 settings.gradle.kts 对齐）
      parameters:
        - name: groupKey
          in: query
          required: false
          schema:
            type: string
          description: 按分组过滤
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Module"

  /v1/module-reports:
    post:
      tags: [Reports]
      summary: 创建/提交模块报告
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleReport"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleReport"

  /v1/module-reports/{modulePath}:
    get:
      tags: [Reports]
      summary: 获取某模块最新报告
      parameters:
        - name: modulePath
          in: path
          required: true
          schema:
            type: string
          description: Gradle module path，例如 :player_component（URL 编码后传输）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleReport"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/findings:
    post:
      tags: [Findings]
      summary: 新增 Finding（模块报告增量维护）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Finding"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"

  /v1/findings/{id}:
    patch:
      tags: [Findings]
      summary: 更新 Finding（状态/结论/优先级等）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: moduleLocalId 或 globalId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FindingPatch"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"

  /v1/tasks:
    post:
      tags: [Tasks]
      summary: 新增治理任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefactorTask"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefactorTask"

  /v1/tasks/{id}:
    patch:
      tags: [Tasks]
      summary: 更新治理任务（状态/负责人/验收等）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: moduleLocalId 或 globalId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskPatch"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefactorTask"

  /v1/global-summaries:
    post:
      tags: [Summaries]
      summary: 创建一份全局汇总（可增量更新）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GlobalSummary"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalSummary"

components:
  schemas:
    ModuleGroup:
      type: object
      required: [key, name, order, modulePaths]
      properties:
        key:
          type: string
          example: CORE
        name:
          type: string
          example: 基础能力模块
        order:
          type: integer
          example: 10
        modulePaths:
          type: array
          items:
            type: string
          example: [":core_storage_component", ":core_network_component"]
        notes:
          type: string
          nullable: true

    Module:
      type: object
      required: [path, dir, groupKey, status]
      properties:
        path:
          type: string
          example: ":player_component"
        dir:
          type: string
          example: "player_component/"
        groupKey:
          type: string
          example: FEATURE
        owner:
          type: string
          nullable: true
        status:
          type: string
          enum: [NotStarted, InProgress, Done, Observing]

    Evidence:
      type: object
      required: [filePath, symbol, kind]
      properties:
        filePath:
          type: string
          example: "player_component/src/main/java/com/xyoye/.../Foo.kt"
        symbol:
          type: string
          example: "Foo#bar"
        kind:
          type: string
          enum: [Code, Config, Resource, Log, Doc]
        notes:
          type: string
          nullable: true
        excerpt:
          type: string
          nullable: true
        lineHint:
          type: string
          nullable: true
        command:
          type: string
          nullable: true

    Finding:
      type: object
      required:
        - moduleLocalId
        - modulePath
        - title
        - description
        - category
        - recommendation
        - evidences
        - impact
        - effort
        - priority
        - status
      properties:
        moduleLocalId:
          type: string
          example: PLAYER-F001
        globalId:
          type: string
          nullable: true
          example: G-F0007
        modulePath:
          type: string
          example: ":player_component"
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [Duplication, Redundancy, ReuseOpportunity, ArchitectureRisk, SecurityPrivacyRisk]
        multiImplType:
          type: string
          nullable: true
          enum: [Intentional, Unintentional, N/A]
        recommendation:
          type: string
          enum: [Keep, Unify, Deprecate]
        suggestedLanding:
          type: string
          nullable: true
          example: ":core_storage_component"
        evidences:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Evidence"
        impact:
          type: string
          enum: [High, Medium, Low]
        effort:
          type: string
          enum: [Small, Medium, Large]
        priority:
          type: string
          enum: [P1, P2, P3]
        risks:
          type: array
          items:
            type: string
          nullable: true
        dependencies:
          type: array
          items:
            type: string
          nullable: true
        owner:
          type: string
          nullable: true
        status:
          type: string
          enum: [Draft, Reviewed, Accepted, Rejected, Closed]

    RefactorTask:
      type: object
      required:
        - moduleLocalId
        - title
        - goal
        - scope
        - relatedFindings
        - acceptanceCriteria
        - impact
        - effort
        - priority
        - status
      properties:
        moduleLocalId:
          type: string
          example: CORE_STORAGE-T012
        globalId:
          type: string
          nullable: true
          example: G-T0003
        title:
          type: string
        goal:
          type: string
        scope:
          type: string
        relatedFindings:
          type: array
          minItems: 1
          items:
            type: string
        acceptanceCriteria:
          type: array
          minItems: 1
          items:
            type: string
        impact:
          type: string
          enum: [High, Medium, Low]
        effort:
          type: string
          enum: [Small, Medium, Large]
        priority:
          type: string
          enum: [P1, P2, P3]
        owner:
          type: string
          nullable: true
        status:
          type: string
          enum: [Draft, Planned, InProgress, Done, Dropped]
        risks:
          type: array
          items:
            type: string
          nullable: true
        dependencies:
          type: array
          items:
            type: string
          nullable: true

    ModuleReport:
      type: object
      required: [modulePath, owner, date, background, findings, tasks]
      properties:
        modulePath:
          type: string
          example: ":player_component"
        owner:
          type: string
        date:
          type: string
          example: "2026-02-03"
        background:
          type: string
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/RefactorTask"
        risks:
          type: array
          items:
            type: string
          nullable: true
        notes:
          type: string
          nullable: true

    GlobalSummary:
      type: object
      required: [date, moduleReports, globalFindings, globalTasks, sourceMapping]
      properties:
        date:
          type: string
          example: "2026-02-03"
        moduleReports:
          type: array
          items:
            type: string
          description: 纳入汇总的模块报告标识（可用 modulePath+date）
        globalFindings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        globalTasks:
          type: array
          items:
            $ref: "#/components/schemas/RefactorTask"
        sourceMapping:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: globalId -> [moduleLocalIds...]
        roadmap:
          type: array
          items:
            type: string
          nullable: true

    FindingPatch:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [Duplication, Redundancy, ReuseOpportunity, ArchitectureRisk, SecurityPrivacyRisk]
        multiImplType:
          type: string
          enum: [Intentional, Unintentional, N/A]
        recommendation:
          type: string
          enum: [Keep, Unify, Deprecate]
        suggestedLanding:
          type: string
          nullable: true
        evidences:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
        impact:
          type: string
          enum: [High, Medium, Low]
        effort:
          type: string
          enum: [Small, Medium, Large]
        priority:
          type: string
          enum: [P1, P2, P3]
        owner:
          type: string
          nullable: true
        status:
          type: string
          enum: [Draft, Reviewed, Accepted, Rejected, Closed]

    TaskPatch:
      type: object
      properties:
        title:
          type: string
        goal:
          type: string
        scope:
          type: string
        relatedFindings:
          type: array
          items:
            type: string
        acceptanceCriteria:
          type: array
          items:
            type: string
        impact:
          type: string
          enum: [High, Medium, Low]
        effort:
          type: string
          enum: [Small, Medium, Large]
        priority:
          type: string
          enum: [P1, P2, P3]
        owner:
          type: string
          nullable: true
        status:
          type: string
          enum: [Draft, Planned, InProgress, Done, Dropped]

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        details:
          type: string
          nullable: true
