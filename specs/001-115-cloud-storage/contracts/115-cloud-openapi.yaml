openapi: 3.0.3
info:
  title: 115 Cloud API (Subset for DDPlayTV)
  version: 0.1.0
  description: |
    说明：
    - 本文件是为 DDPlayTV 的“115 Cloud 存储源：扫码授权 + 浏览 + 搜索 + 在线播放（直链）”整理的 OpenAPI 子集契约，便于后续实现与联调。
    - 115 Cloud 属于非开放平台接口（与 115 Open 不同）；接口与字段可能变动，需以实现期抓包/线上回归为准。
    - 关键字段、调用顺序与策略说明见：
      - specs/001-115-cloud-storage/research.md
      - specs/001-115-cloud-storage/115-cloud-openapi.md
    - 注意：
      - 扫码登录成功后得到的凭证为 Cookie（UID/CID/SEID/KID），后续请求需携带 Cookie + User-Agent。
      - 获取播放直链需要 m115 加解密：请求 form 的 data 字段与响应 data 字段都需要按算法处理（OpenAPI 仅描述外层 envelope）。

servers:
  - url: https://qrcodeapi.115.com
    description: QRCode endpoints
  - url: https://passportapi.115.com
    description: Auth endpoints (QRCode login)
  - url: https://my.115.com
    description: Status endpoints (cookie check)
  - url: https://webapi.115.com
    description: Files endpoints (list/search/stat)
  - url: https://proapi.115.com
    description: Download endpoints (play url)

paths:
  /api/1.0/web/1.0/token:
    get:
      operationId: qrcodeToken
      summary: 获取二维码登录会话 token（uid/time/sign/qrcode）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QRCodeTokenResp"

  /api/1.0/mac/1.0/qrcode:
    get:
      operationId: qrcodeImage
      summary: 获取二维码图片（PNG）
      parameters:
        - name: uid
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            image/png:
              schema:
                type: string
                format: binary

  /get/status/:
    get:
      operationId: qrcodeStatus
      summary: 轮询二维码状态
      description: |
        status 常见值（以实际响应为准）：
        - 0：等待扫码
        - 1：已扫码未确认
        - 2：已确认（允许换取 cookie）
        - -1：过期
        - -2：取消
      parameters:
        - name: uid
          in: query
          required: true
          schema:
            type: string
        - name: time
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: sign
          in: query
          required: true
          schema:
            type: string
        - name: _
          in: query
          required: false
          schema:
            type: string
          description: 时间戳（可选）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QRCodeStatusResp"

  /app/1.0/{app}/1.0/login/qrcode:
    post:
      operationId: qrcodeLogin
      summary: 二维码确认登录，换取 Cookie
      parameters:
        - name: app
          in: path
          required: true
          schema:
            type: string
            description: 设备来源（建议使用 tv/wechatmini/alipaymini/qandroid 等非日常设备）
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [account]
              properties:
                account:
                  type: string
                  description: token 接口返回的 uid
                app:
                  type: string
                  description: 部分实现同时在表单里传 app（与 path 一致）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QRCodeLoginResp"

  /:
    get:
      operationId: cookieStatus
      summary: Cookie 有效性检查（不建议使用会影响其他设备的校验）
      description: |
        建议用于“重启免重复授权”的快速校验：仅检查 state。
        实际请求：GET https://my.115.com/?ct=guide&ac=status
      parameters:
        - name: ct
          in: query
          required: true
          schema:
            type: string
            enum: [guide]
        - name: ac
          in: query
          required: true
          schema:
            type: string
            enum: [status]
        - name: _
          in: query
          required: false
          schema:
            type: string
          description: 时间戳（可选）
        - name: Cookie
          in: header
          required: true
          schema:
            type: string
          description: UID/CID/SEID/KID 等 cookie
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CookieStatusResp"

  /files:
    get:
      operationId: listFiles
      summary: 列目录（包含文件与目录）
      parameters:
        - name: Cookie
          in: header
          required: true
          schema:
            type: string
        - name: User-Agent
          in: header
          required: true
          schema:
            type: string
          description: 建议使用 115Browser/115disk 风格 UA
        - name: aid
          in: query
          required: true
          schema:
            type: string
            example: "1"
        - name: cid
          in: query
          required: true
          schema:
            type: string
            example: "0"
          description: 目录 ID；根目录为 0
        - name: offset
          in: query
          required: true
          schema:
            type: integer
            example: 0
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            example: 200
        - name: show_dir
          in: query
          required: true
          schema:
            type: integer
            enum: [0, 1]
        - name: o
          in: query
          required: false
          schema:
            type: string
            enum: [file_name, file_size, user_ptime, file_type]
          description: 排序字段
        - name: asc
          in: query
          required: false
          schema:
            type: integer
            enum: [0, 1]
          description: 0 降序 / 1 升序
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResp"

  /files/search:
    get:
      operationId: searchFiles
      summary: 搜索（建议用于“当前目录递归搜索视频”）
      parameters:
        - name: Cookie
          in: header
          required: true
          schema:
            type: string
        - name: User-Agent
          in: header
          required: true
          schema:
            type: string
        - name: search_value
          in: query
          required: true
          schema:
            type: string
        - name: cid
          in: query
          required: true
          schema:
            type: string
            example: "0"
        - name: type
          in: query
          required: false
          schema:
            type: integer
            description: 0 全部 / 4 视频
        - name: count_folders
          in: query
          required: false
          schema:
            type: integer
            description: 是否统计/包含目录
        - name: offset
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: o
          in: query
          required: false
          schema:
            type: string
            enum: [file_name, file_size, user_ptime, file_type]
        - name: asc
          in: query
          required: false
          schema:
            type: integer
            enum: [0, 1]
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResp"

  /category/get:
    get:
      operationId: stat
      summary: 获取文件/目录统计信息与父路径（paths）
      parameters:
        - name: Cookie
          in: header
          required: true
          schema:
            type: string
        - name: User-Agent
          in: header
          required: true
          schema:
            type: string
        - name: cid
          in: query
          required: true
          schema:
            type: string
          description: 文件/目录 ID
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileStatResponse"

  /android/2.0/ufile/download:
    post:
      operationId: downloadUrl
      summary: 获取播放/下载直链（需要 m115 加解密）
      description: |
        注意：该接口的请求/响应 data 字段都需要 m115 算法处理（OpenAPI 不展开加密细节）。
        - 请求明文 payload 参考：{"pick_code":"<pickcode>"}
        - 将明文与本次请求 key 组装后 m115 加密得到 data（base64 串），以 form 发送
        - 响应中 data 再用同一请求 key 解密得到 {"url":"https://..."}
      parameters:
        - name: t
          in: query
          required: true
          schema:
            type: string
          description: 时间戳（秒级/毫秒级以实际要求为准）
        - name: Cookie
          in: header
          required: true
          schema:
            type: string
        - name: User-Agent
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: string
                  description: m115 加密后的 payload（base64 串）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadResp"

components:
  schemas:
    QRCodeBasicResp:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        state:
          type: integer
          description: 1 表示成功（部分接口）
        errno:
          type: integer
        error:
          type: string

    QRCodeSession:
      type: object
      required: [uid, time, sign]
      properties:
        uid:
          type: string
        time:
          type: integer
          format: int64
        sign:
          type: string
        qrcode:
          type: string
          description: 二维码内容（可用第三方库生成二维码；或直接请求 qrcode 图片接口）

    QRCodeTokenResp:
      allOf:
        - $ref: "#/components/schemas/QRCodeBasicResp"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/QRCodeSession"

    QRCodeStatus:
      type: object
      properties:
        msg:
          type: string
        status:
          type: integer
        version:
          type: string

    QRCodeStatusResp:
      allOf:
        - $ref: "#/components/schemas/QRCodeBasicResp"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/QRCodeStatus"

    Credential:
      type: object
      properties:
        UID:
          type: string
        CID:
          type: string
        SEID:
          type: string
        KID:
          type: string

    QRCodeLoginResp:
      allOf:
        - $ref: "#/components/schemas/QRCodeBasicResp"
        - type: object
          properties:
            data:
              type: object
              properties:
                cookie:
                  $ref: "#/components/schemas/Credential"
                user_id:
                  type: integer
                user_name:
                  type: string
                mobile:
                  type: string
                email:
                  type: string
                is_vip:
                  type: integer
                face:
                  type: object
                  properties:
                    face_s:
                      type: string
                    face_m:
                      type: string
                    face_l:
                      type: string

    CookieStatusResp:
      type: object
      properties:
        state:
          type: boolean

    BasicResp:
      type: object
      properties:
        state:
          type: boolean
          description: webapi/proapi 常见业务成功标记
        errno:
          type: string
        errNo:
          type: integer
        error:
          type: string
        errtype:
          type: string
        msg:
          type: string

    FileListResp:
      allOf:
        - $ref: "#/components/schemas/BasicResp"
        - type: object
          properties:
            aid:
              type: string
            cid:
              type: string
            count:
              type: integer
            order:
              type: string
            is_asc:
              type: integer
            offset:
              type: integer
            limit:
              type: integer
            page_size:
              type: integer
            data:
              type: array
              items:
                $ref: "#/components/schemas/FileInfo"

    FileInfo:
      type: object
      properties:
        aid:
          type: string
        cid:
          type: string
          description: 对文件：父目录 ID；对目录：目录自身 ID
        fid:
          type: string
          description: 文件 ID；目录通常为空字符串
        pid:
          type: string
          description: 目录的父目录 ID（文件通常为空）
        n:
          type: string
          description: 名称
        ico:
          type: string
          description: 类型/后缀标识
        s:
          type: integer
          format: int64
          description: 大小（字节）
        sha:
          type: string
        pc:
          type: string
          description: pickcode（用于获取直链）
        m:
          type: integer
          description: 是否星标等
        t:
          type: string
          description: 更新时间（字符串；对目录可能为时间戳字符串）
        tp:
          type: integer
          format: int64
          description: 创建时间（秒）
        fl:
          type: array
          items:
            $ref: "#/components/schemas/LabelInfo"

    LabelInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string

    FileParentInfo:
      type: object
      properties:
        file_id:
          type: integer
        file_name:
          type: string

    FileStatResponse:
      type: object
      properties:
        count:
          type: integer
        size:
          type: string
        folder_count:
          type: integer
        ptime:
          type: integer
          format: int64
        utime:
          type: integer
          format: int64
        file_name:
          type: string
        pick_code:
          type: string
        sha1:
          type: string
        file_category:
          type: integer
          description: 1 文件 / 0 目录
        paths:
          type: array
          items:
            $ref: "#/components/schemas/FileParentInfo"

    DownloadResp:
      allOf:
        - $ref: "#/components/schemas/BasicResp"
        - type: object
          properties:
            data:
              type: string
              description: m115 加密响应体（base64 串），需解密得到 url

